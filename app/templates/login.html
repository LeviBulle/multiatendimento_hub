<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login · MultiAtendimento Hub</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/css/app.css') }}">
</head>
<body class="login-page">
  <main class="login-box">
    <h1>MultiAtendimento Hub</h1>
    <p>Entre para gerenciar conversas, clientes e atendimentos simulados.</p>
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <form class="form-grid" method="post" action="/login">
      <div class="form-row">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" value="admin@hub.local" required>
      </div>
      <div class="form-row">
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" value="admin123" required>
      </div>
      <button class="button" type="submit">Entrar</button>
    </form>
  </main>
</body>
</html>
